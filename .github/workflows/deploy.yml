name: Deploy to VPS

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "deploy" to confirm VPS deployment'
        required: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.event.inputs.confirm == 'deploy'
    steps:
      - name: Deploy via SSH (shared DailyLens VPS)
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 30m
          script_stop: true
          script: |
            set -e
            cd /var/www/fetcherio
            bash scripts/deploy-vps-from-github.sh
