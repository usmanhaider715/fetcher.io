services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - '127.0.0.1:27017:27017'
    environment:
      MONGO_INITDB_ROOT_USERNAME: fetcher
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-changeme}
      MONGO_INITDB_DATABASE: fetcherio
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - '127.0.0.1:6379:6379'
    command: redis-server --requirepass ${REDIS_PASSWORD:-changeme}
    volumes:
      - redis_data:/data

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    ports:
      - '127.0.0.1:4000:4000'
    env_file:
      - apps/api/.env
    depends_on:
      - mongo
      - redis

  worker:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    command: ['node', 'dist/worker.js']
    env_file:
      - apps/api/.env
    depends_on:
      - mongo
      - redis

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    ports:
      - '127.0.0.1:3000:3000'
    environment:
      NEXT_PUBLIC_API_URL: http://api:4000
    depends_on:
      - api

volumes:
  mongo_data:
  redis_data:
