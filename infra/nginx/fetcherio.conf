# Fetcher.io — Nginx reverse proxy (copy to /etc/nginx/sites-available/fetcherio.conf)

upstream fetcherio_api {
    server 127.0.0.1:4000;
    keepalive 32;
}

upstream fetcherio_web {
    server 127.0.0.1:3000;
    keepalive 16;
}

upstream fetcherio_admin {
    server 127.0.0.1:3001;
    keepalive 8;
}

# Marketing + app dashboard (same Next.js instance, host-based routing in middleware)
server {
    listen 443 ssl http2;
    server_name fetcherio.dev www.fetcherio.dev app.fetcherio.dev docs.fetcherio.dev;

    ssl_certificate /etc/letsencrypt/live/fetcherio.dev/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/fetcherio.dev/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    location / {
        proxy_pass http://fetcherio_web;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}

server {
    listen 443 ssl http2;
    server_name admin.fetcherio.dev;

    ssl_certificate /etc/letsencrypt/live/fetcherio.dev/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/fetcherio.dev/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        proxy_pass http://fetcherio_admin;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 443 ssl http2;
    server_name api.fetcherio.dev;

    ssl_certificate /etc/letsencrypt/live/fetcherio.dev/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/fetcherio.dev/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 10m;

    location / {
        proxy_pass http://fetcherio_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}

server {
    listen 80;
    server_name fetcherio.dev www.fetcherio.dev app.fetcherio.dev api.fetcherio.dev admin.fetcherio.dev docs.fetcherio.dev;
    return 301 https://$host$request_uri;
}
