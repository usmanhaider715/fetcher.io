# Fetcher.io — HTTP nginx (shared DailyLens VPS, separate server blocks)
# Ports: API 4000, web 3020, admin 3021 (DailyLens uses 3000 + 5001)

upstream fetcherio_api {
    server 127.0.0.1:4000;
    keepalive 32;
}

upstream fetcherio_web {
    server 127.0.0.1:3020;
    keepalive 16;
}

upstream fetcherio_admin {
    server 127.0.0.1:3020;
    keepalive 8;
}

server {
    listen 80;
    server_name fetcherio.dev www.fetcherio.dev app.fetcherio.dev docs.fetcherio.dev;

    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;

    location / {
        proxy_pass http://fetcherio_web;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}

server {
    listen 80;
    server_name admin.fetcherio.dev;

    location / {
        proxy_pass http://fetcherio_admin;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 80;
    server_name api.fetcherio.dev;

    client_max_body_size 10m;

    location / {
        proxy_pass http://fetcherio_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
